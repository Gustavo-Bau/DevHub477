<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEVHUB | Cadastro de fornecedor</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a class="brand" href="./software-marketplace-dashboard.html" style="text-decoration: none; color: inherit;">DEVHUB</a>
      <div class="row">
        <a class="btn btn-secondary" href="./login.html">Entrar</a>
        <a class="btn btn-primary" href="./software-marketplace-dashboard.html">Mercado</a>
      </div>
    </div>
  </header>

  <main class="container">
    <h1 class="section-title">Criar conta de fornecedor</h1>
    <p class="message info">Cadastre sua empresa para disponibilizar produtos no mercado DEVHUB.</p>

    <div class="two-col">
      <form class="card form">
        <h3>Dados do fornecedor</h3>
        <input class="input" name="responsavel" placeholder="Nome do responsÃ¡vel" required />
        <input class="input" name="empresa" placeholder="Nome da empresa" required />
        <input class="input" name="email" type="email" placeholder="E-mail comercial" required />
        <input class="input" name="senha" type="password" placeholder="Senha" required />
        <button class="btn btn-primary" type="submit">Criar conta</button>
      </form>

      <section class="card">
        <h3>Outros tipos de conta</h3>
        <p>Escolha o cadastro comum para comprar produtos ou o empresarial para gerenciar uma equipe.</p>
        <div class="form">
          <a class="btn btn-secondary" href="./create-account.html">Conta comum</a>
          <a class="btn btn-secondary" href="./create-account-company.html">Conta empresarial</a>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
