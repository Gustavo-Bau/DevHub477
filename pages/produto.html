<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEVHUB | Detalhes do produto</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a class="brand" href="./software-marketplace-dashboard.html">DEVHUB</a>
      <div class="row" style="flex-wrap: wrap; gap: .75rem;">
        <a class="btn btn-secondary" href="./software-marketplace-dashboard.html">Mercado</a>
        <a class="btn btn-secondary" href="./wishlist.html">Favoritos</a>
        <a class="btn btn-primary" href="./checkout-payment.html">Ir ao checkout</a>
      </div>
    </div>
  </header>
  <main class="container" style="padding: 2rem 0;">
    <section id="produtoDetalhe" class="card" data-products-endpoint="/api/products">
      <p class="message info">Carregando os detalhes do produto...</p>
    </section>
  </main>
  <script>
    (() => {
      const container = document.querySelector('#produtoDetalhe');
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || params.get('slug');
      const endpoint = container.dataset.productsEndpoint;
      const fallbackProducts = [
        {
          slug: 'cloudscale-pro',
          name: 'CloudScale Pro',
          description: 'Plataforma completa de gestão em nuvem com monitoramento, automação e dados em tempo real.',
          vendor: 'DevHub Labs',
          category: 'SaaS e Nuvem',
          platform: 'Web',
          rating: 4.9,
          price: 299,
          priceText: 'R$ 299,00 / mês',
          features: ['Dashboard unificado', 'Alertas inteligentes', 'Conectores SaaS']
        },
        {
          slug: 'api-gateway',
          name: 'API Gateway Pro',
          description: 'Controle o tráfego de APIs, segurança e análise com uma solução projetada para times de desenvolvedores.',
          vendor: 'Gateway Studio',
          category: 'Ferramentas Dev',
          platform: 'Web',
          rating: 4.7,
          price: 149,
          priceText: 'R$ 149,00 / mês',
          features: ['Rate limiting', 'Autenticação JWT', 'Relatórios de uso']
        }
      ];

      function formatPrice(product) {
        return product.priceText || (typeof product.price === 'number' ? new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(product.price) : 'Sob consulta');
      }

      function renderEmpty(message = 'Nenhum produto foi encontrado para este identificador.') {
        container.innerHTML = `
          <h2>Produto indisponível</h2>
          <p>${message}</p>
          <p class="small">Use <strong>?id=slug-do-produto</strong> ou acesse o marketplace para encontrar produtos disponíveis.</p>
          <div class="row" style="justify-content:flex-start; margin-top:1rem; gap:1rem; flex-wrap:wrap;">
            <a class="btn btn-primary" href="./software-marketplace-dashboard.html">Ir ao marketplace</a>
            <a class="btn btn-secondary" href="./orders.html">Meus pedidos</a>
          </div>
        `;
      }

      function renderProduto(product) {
        container.innerHTML = `
          <div class="two-col" style="grid-template-columns: 1.5fr 1fr; gap: 1.5rem;">
            <div>
              <h1>${product.name}</h1>
              <p style="color: var(--muted);">${product.description}</p>
              <div class="row" style="margin-top: 1rem; gap: .75rem; flex-wrap: wrap;">
                <span class="small"><strong>Fornecedor:</strong> ${product.vendor}</span>
                <span class="small"><strong>Categoria:</strong> ${product.category}</span>
                <span class="small"><strong>Plataforma:</strong> ${product.platform}</span>
                <span class="small"><strong>Nota:</strong> ${product.rating.toFixed(1)} ★</span>
              </div>
              <div class="row" style="margin-top: 1.5rem; gap: 1rem; flex-wrap: wrap; align-items: center;">
                <span class="btn btn-primary" style="padding: 1rem 1.5rem; font-size: 1rem;">Adicionar ao carrinho</span>
                <a class="btn btn-secondary" href="./checkout-payment.html">Comprar agora</a>
              </div>
            </div>
            <aside class="card" style="background:#f8f9ff; padding: 1.5rem;">
              <h3 style="margin-top:0;">Resumo</h3>
              <p class="small"><strong>Preço:</strong> ${formatPrice(product)}</p>
              <p class="small"><strong>Condição:</strong> Assinatura mensal</p>
              <p class="small"><strong>Suporte:</strong> 24/7 por fornecedor</p>
            </aside>
          </div>
          <section style="margin-top: 1.5rem;">
            <h2 class="section-title">Recursos principais</h2>
            <ul style="margin-top: 1rem; padding-left: 1.2rem; color: var(--muted);">
              ${product.features.map(feature => `<li>${feature}</li>`).join('')}
            </ul>
          </section>
          <section style="margin-top: 1.5rem;">
            <h2 class="section-title">Avaliações</h2>
            <div class="card" style="padding: 1rem; margin-top: 1rem;">
              <p class="small"><strong>João S.</strong> • Nota 5</p>
              <p>Excelente plataforma para acompanhar a saúde dos serviços em tempo real.</p>
            </div>
            <div class="card" style="padding: 1rem; margin-top: 1rem;">
              <p class="small"><strong>Maria F.</strong> • Nota 4.5</p>
              <p>Integração rápida e suporte eficiente. Recomendado para times ágeis.</p>
            </div>
          </section>
        `;
      }

      function findFallbackProduct(slug) {
        return fallbackProducts.find(item => item.slug === slug || item.slug === id || item.name.toLowerCase().includes(id?.toLowerCase()));
      }

      async function loadProduto() {
        if (!id) return renderEmpty('Informe um id ou slug válido na URL.');
        let product = findFallbackProduct(id);
        if (endpoint) {
          try {
            const response = await fetch(`${endpoint}/${encodeURIComponent(id)}`, { headers: { Accept: 'application/json' } });
            if (response.ok) {
              const data = await response.json();
              product = {
                slug: data.slug || data.id,
                name: data.name || data.nome || 'Produto sem nome',
                description: data.description || data.descricao || 'Detalhes não disponíveis.',
                vendor: data.vendor || data.fornecedor || data.company || 'Fornecedor não informado',
                category: data.category || data.categoria || 'Categoria não informada',
                platform: data.platform || data.plataforma || 'Web',
                rating: Number(data.rating || data.avaliacao || 0),
                price: Number(data.price || data.preco || 0),
                priceText: data.priceText || data.precoTexto || null,
                features: data.features || data.recursos || ['Recursos não informados']
              };
            }
          } catch (error) {
            // keep fallback product
          }
        }
        if (!product) return renderEmpty('Este produto não foi encontrado.');
        renderProduto(product);
      }

      loadProduto();
    })();
  </script>
</body>
</html>
